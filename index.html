<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="theme-color" content="#B91C1C" />
    <title>Nuevo Munich · CRM</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html { height: 100%; overflow: hidden; }
      body { height: 100%; margin: 0; overflow: hidden; overflow-x: hidden; overscroll-behavior: none; }
      #root { height: 100%; display: flex; flex-direction: column; overflow: hidden; }

      /* iOS scroll nativo */
      .scroll-y { overflow-y: auto; -webkit-overflow-scrolling: touch; }
      /* Ocultar scrollbar en strips horizontales */
      .strip::-webkit-scrollbar { display: none; }
      .strip { -ms-overflow-style: none; scrollbar-width: none; }

      /* ── Layout responsive principal ── */
      .app-layout  { display: flex; height: 100%; overflow: hidden; }
      .app-sidebar { flex-shrink: 0; width: 340px; height: 100%; }
      .app-main    { flex: 1; min-width: 0; height: 100%; overflow: hidden; display: flex; flex-direction: column; }

      @media (max-width: 767px) {
        /* Mobile: sidebar ocupa todo, panel oculto */
        .app-sidebar { width: 100% !important; min-width: 0 !important; }
        .app-main    { display: none !important; }

        /* Cuando hay un panel activo: ocultar sidebar, mostrar panel */
        .in-panel .app-sidebar { display: none !important; }
        .in-panel .app-main    { display: flex !important; flex: 1; width: 100%; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
