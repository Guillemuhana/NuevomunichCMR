<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />

    <meta name="theme-color" content="#B91C1C" />
    <title>Nuevo Munich · CRM</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html { height: 100%; overflow: hidden; }
      body { height: 100%; margin: 0; overflow: hidden; overflow-x: hidden; overscroll-behavior: none; }
      #root { height: 100%; display: flex; flex-direction: column; overflow: hidden; }
      /* iOS scroll fix: allow inner scroll, block outer */
      .scroll-y { overflow-y: auto; -webkit-overflow-scrolling: touch; }
      /* Hide scrollbar on mobile action strips */
      .strip::-webkit-scrollbar { display: none; }
      .strip { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
